name: Bug report
description: Report a bug in the Apruvly Python client
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        **Security issues** must not be filed here — use [private vulnerability reporting](https://github.com/apruvly/apruvly-python/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a small code sample.
      placeholder: |
        1. Install apruvly==…
        2. Run …
        3. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stack traces if relevant (redact API keys and secrets).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Client version
      description: Output of `python -c "import apruvly; print(apruvly.__version__)"`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
